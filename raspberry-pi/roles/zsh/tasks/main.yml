---
# ============================================
# Zsh Role
# ============================================
# Purpose: Install and configure Zsh with Oh My Zsh
# Runs with: become: no (user-level installation)
# ============================================

- name: Install Zsh package
  apt:
    name: zsh
    state: present
  become: yes

- name: Check if Oh My Zsh is already installed
  stat:
    path: "{{ home_dir }}/.oh-my-zsh"
  register: ohmyzsh_stat

- name: Install Oh My Zsh
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "{{ home_dir }}/.oh-my-zsh"
  when: not ohmyzsh_stat.stat.exists

- name: Check if zsh-autosuggestions is installed
  stat:
    path: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
  register: autosuggestions_stat

- name: Clone zsh-autosuggestions plugin
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    update: no
  when: not autosuggestions_stat.stat.exists

- name: Check if zsh-syntax-highlighting is installed
  stat:
    path: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
  register: syntax_highlighting_stat

- name: Clone zsh-syntax-highlighting plugin
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    update: no
  when: not syntax_highlighting_stat.stat.exists

- name: Deploy .zshrc from template
  template:
    src: zshrc.j2
    dest: "{{ home_dir }}/.zshrc"
    mode: '0644'

- name: Get current shell for user
  command: "getent passwd {{ ansible_user }}"
  register: current_shell
  changed_when: false

- name: Change default shell to Zsh
  command: "chsh -s /usr/bin/zsh {{ ansible_user }}"
  become: yes
  when: "'/usr/bin/zsh' not in current_shell.stdout"

- name: Remove legacy .zshrc backup files
  shell: rm -f {{ home_dir }}/.zshrc.backup.*
  args:
    executable: /bin/bash
  changed_when: false

- name: Display Zsh installation summary
  debug:
    msg: |
      Zsh configured successfully!
      - Theme: {{ zsh_theme }}
      - Plugins: {{ zsh_plugins | length }} enabled
      - Prompt icon: {{ zsh_prompt_icon }}
      - History: {{ zsh_histsize }} commands

# ============================================
# Update: Oh My Zsh
# ============================================

- name: Update Oh My Zsh
  shell: |
    ZSH={{ home_dir }}/.oh-my-zsh {{ home_dir }}/.oh-my-zsh/tools/upgrade.sh
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  register: ohmyzsh_update_result
  changed_when: "'Updated' in ohmyzsh_update_result.stdout or 'upgraded' in ohmyzsh_update_result.stdout"
  failed_when: false
  tags: ['zsh', 'zsh-update', 'update']

- name: Display Oh My Zsh update result
  debug:
    msg: "{{ ohmyzsh_update_result.stdout if ohmyzsh_update_result.stdout else 'Oh My Zsh update check completed' }}"
  when: ohmyzsh_update_result is defined
  tags: ['zsh', 'zsh-update', 'update']

# ============================================
# Update: zsh-autosuggestions
# ============================================

- name: Update zsh-autosuggestions plugin
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    update: yes
    version: master
  register: autosuggestions_update_result
  tags: ['zsh', 'zsh-update', 'update']

- name: Display zsh-autosuggestions update result
  debug:
    msg: "zsh-autosuggestions {{ 'Updated' if autosuggestions_update_result.changed else 'Already up to date' }}"
  tags: ['zsh', 'zsh-update', 'update']

# ============================================
# Update: zsh-syntax-highlighting
# ============================================

- name: Update zsh-syntax-highlighting plugin
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    update: yes
    version: master
  register: syntax_highlighting_update_result
  tags: ['zsh', 'zsh-update', 'update']

- name: Display zsh-syntax-highlighting update result
  debug:
    msg: "zsh-syntax-highlighting {{ 'Updated' if syntax_highlighting_update_result.changed else 'Already up to date' }}"
  tags: ['zsh', 'zsh-update', 'update']

# ============================================
# Update Summary
# ============================================

- name: Display Zsh update summary
  debug:
    msg: |
      ============================================
      Zsh Update Summary
      ============================================
      
      Oh My Zsh:           {{ ohmyzsh_update_result is changed | ternary('Updated', 'Up to date') }}
      autosuggestions:     {{ autosuggestions_update_result is changed | ternary('Updated', 'Up to date') }}
      syntax-highlighting:  {{ syntax_highlighting_update_result is changed | ternary('Updated', 'Up to date') }}
      
      ============================================
  tags: ['zsh', 'zsh-update', 'update']
