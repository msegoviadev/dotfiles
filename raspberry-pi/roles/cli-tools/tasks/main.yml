---
# ============================================
# CLI Tools Role
# ============================================
# Purpose: Install modern CLI tools
# Runs with: become: yes (root privileges)
# ============================================

- name: Install Debian packages
  apt:
    name: "{{ debian_packages }}"
    state: present
    update_cache: yes

- name: Create ~/.local/bin directory
  file:
    path: "{{ home_dir }}/.local/bin"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create symlink for fd (fdfind -> fd)
  file:
    src: /usr/bin/fdfind
    dest: "{{ home_dir }}/.local/bin/fd"
    state: link
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create symlink for bat (batcat -> bat)
  file:
    src: /usr/bin/batcat
    dest: "{{ home_dir }}/.local/bin/bat"
    state: link
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

# ============================================
# Install yq (YAML processor)
# ============================================

- name: Check if yq is already installed
  stat:
    path: /usr/local/bin/yq
  register: yq_stat

- name: Get latest yq version
  uri:
    url: https://api.github.com/repos/mikefarah/yq/releases/latest
    return_content: yes
  register: yq_release
  when: not yq_stat.stat.exists

- name: Download yq binary (ARM64)
  get_url:
    url: "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_arm64"
    dest: /usr/local/bin/yq
    mode: '0755'
    owner: root
    group: root
  when: not yq_stat.stat.exists

- name: Verify yq installation
  command: /usr/local/bin/yq --version
  register: yq_version_check
  changed_when: false
  failed_when: false

# ============================================
# Install ast-grep (Code search tool)
# ============================================

- name: Check if ast-grep is already installed
  stat:
    path: /usr/local/bin/ast-grep
  register: astgrep_stat

- name: Install ast-grep binary
  block:
    - name: Create temporary directory for ast-grep
      tempfile:
        state: directory
        suffix: astgrep
      register: astgrep_temp
      when: not astgrep_stat.stat.exists

    - name: Download ast-grep archive (ARM64)
      get_url:
        url: "https://github.com/ast-grep/ast-grep/releases/latest/download/ast-grep-aarch64-unknown-linux-gnu.zip"
        dest: "{{ astgrep_temp.path }}/ast-grep.zip"
        mode: '0644'
      when: not astgrep_stat.stat.exists

    - name: Install unzip if not present
      apt:
        name: unzip
        state: present
      when: not astgrep_stat.stat.exists

    - name: Extract ast-grep archive
      unarchive:
        src: "{{ astgrep_temp.path }}/ast-grep.zip"
        dest: "{{ astgrep_temp.path }}"
        remote_src: yes
      when: not astgrep_stat.stat.exists

    - name: Find ast-grep binary in extracted files
      find:
        paths: "{{ astgrep_temp.path }}"
        patterns: "ast-grep"
        recurse: yes
        file_type: file
      register: astgrep_binary
      when: not astgrep_stat.stat.exists

    - name: Copy ast-grep to /usr/local/bin
      copy:
        src: "{{ astgrep_binary.files[0].path }}"
        dest: /usr/local/bin/ast-grep
        mode: '0755'
        owner: root
        group: root
        remote_src: yes
      when: not astgrep_stat.stat.exists and astgrep_binary.files | length > 0

    - name: Clean up temporary directory
      file:
        path: "{{ astgrep_temp.path }}"
        state: absent
      when: astgrep_temp.path is defined

  rescue:
    - name: Display warning if ast-grep installation failed
      debug:
        msg: |
          WARNING: ast-grep installation failed.
          You can manually install it later if needed.
          Continuing with the rest of the playbook...

- name: Verify ast-grep installation
  command: /usr/local/bin/ast-grep --version
  register: astgrep_version_check
  changed_when: false
  failed_when: false

# ============================================
# Install rtk (RTK - Rust Token Killer)
# ============================================

- name: Check if rtk is already installed
  stat:
    path: "{{ home_dir }}/.local/bin/rtk"
  register: rtk_stat

- name: Install rtk via quick install script
  shell: |
    curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  when: not rtk_stat.stat.exists

- name: Verify rtk installation
  command: "{{ home_dir }}/.local/bin/rtk --version"
  register: rtk_version_check
  changed_when: false
  failed_when: false

- name: Display CLI tools installation summary
  debug:
    msg: |
      CLI Tools installed successfully!
      - fd: {{ 'installed' if ansible_facts.packages['fd-find'] is defined else 'not found' }}
      - ripgrep: {{ 'installed' if ansible_facts.packages['ripgrep'] is defined else 'not found' }}
      - bat: {{ 'installed' if ansible_facts.packages['bat'] is defined else 'not found' }}
      - jq: {{ 'installed' if ansible_facts.packages['jq'] is defined else 'not found' }}
      - yq: {{ yq_version_check.stdout if yq_version_check.rc == 0 else 'installation failed' }}
      - ast-grep: {{ astgrep_version_check.stdout if astgrep_version_check.rc == 0 else 'installation failed' }}

# ============================================
# Update: nvm
# ============================================

- name: Get current nvm version
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && nvm --version
  args:
    executable: /bin/bash
  register: nvm_current_version
  changed_when: false
  failed_when: false
  tags: ['cli', 'cli-update', 'update']

- name: Get latest nvm version from GitHub
  uri:
    url: https://api.github.com/repos/nvm-sh/nvm/releases/latest
    return_content: yes
  register: nvm_github_release
  changed_when: false
  failed_when: false
  tags: ['cli', 'cli-update', 'update']

- name: Set nvm latest version fact
  set_fact:
    nvm_latest_version: "{{ nvm_github_release.json.tag_name | regex_replace('^v', '') }}"
  when: nvm_github_release.json is defined and nvm_github_release.json.tag_name is defined
  tags: ['cli', 'cli-update', 'update']

- name: Display nvm version comparison
  debug:
    msg: |
      Current nvm: v{{ nvm_current_version.stdout | default('not installed') }}
      Latest nvm: v{{ nvm_latest_version | default('unknown') }}
      Update needed: {{ nvm_current_version.stdout != nvm_latest_version }}
  when: nvm_current_version.stdout is defined and nvm_latest_version is defined
  tags: ['cli', 'cli-update', 'update']

- name: Update nvm
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v{{ nvm_latest_version }}/install.sh | bash
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  when:
    - nvm_current_version.stdout is defined
    - nvm_latest_version is defined
    - nvm_current_version.stdout != nvm_latest_version
  register: nvm_update_result
  tags: ['cli', 'cli-update', 'update']

- name: Verify nvm version after update
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && nvm --version
  args:
    executable: /bin/bash
  register: nvm_updated_version
  changed_when: false
  when: nvm_update_result is changed
  tags: ['cli', 'cli-update', 'update']

- name: Display nvm update result
  debug:
    msg: |
      {% if nvm_update_result is changed %}
      nvm updated: v{{ nvm_current_version.stdout }} -> v{{ nvm_updated_version.stdout }}
      {% else %}
      nvm already up to date: v{{ nvm_current_version.stdout }}
      {% endif %}
  when: nvm_current_version.stdout is defined
  tags: ['cli', 'cli-update', 'update']

# ============================================
# Update: Node.js LTS
# ============================================

- name: Get current Node.js version
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && node --version
  args:
    executable: /bin/bash
  register: node_current_version
  changed_when: false
  failed_when: false
  tags: ['cli', 'cli-update', 'update']

- name: Get latest available Node.js LTS version
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && nvm ls-remote --lts | tail -n 1 | awk '{print $1}' | sed 's/^->//;s/^[[:space:]]*//' | tr -d '[:blank:]'
  args:
    executable: /bin/bash
  register: node_latest_lts
  changed_when: false
  failed_when: false
  tags: ['cli', 'cli-update', 'update']

- name: Clean Node.js LTS version string
  set_fact:
    node_latest_lts_version: "{{ node_latest_lts.stdout | regex_replace('^->\\s*', '') | trim }}"
  when: node_latest_lts.stdout is defined and node_latest_lts.stdout != ''
  tags: ['cli', 'cli-update', 'update']

- name: Display Node.js version comparison
  debug:
    msg: |
      Current Node.js: {{ node_current_version.stdout | default('not installed') }}
      Latest LTS: {{ node_latest_lts_version | default('unknown') }}
      Update needed: {{ node_current_version.stdout != node_latest_lts_version }}
  when: node_current_version.stdout is defined and node_latest_lts_version is defined
  tags: ['cli', 'cli-update', 'update']

- name: Install latest Node.js LTS
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && nvm install {{ node_latest_lts_version }} && nvm alias default {{ node_latest_lts_version }}
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  when:
    - node_current_version.stdout is defined
    - node_latest_lts_version is defined
    - node_current_version.stdout != node_latest_lts_version
  register: node_update_result
  tags: ['cli', 'cli-update', 'update']

- name: Uninstall previous Node.js version after upgrade
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && nvm uninstall {{ node_current_version.stdout }}
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  when:
    - node_update_result is changed
    - node_current_version.stdout is defined
    - node_current_version.stdout != ''
  failed_when: false
  tags: ['cli', 'cli-update', 'update']

- name: Reinstall global npm packages after Node.js update
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && npm install -g opencode-ai
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  when: node_update_result is changed
  tags: ['cli', 'cli-update', 'update']

- name: Verify Node.js version after update
  shell: |
    . {{ home_dir }}/.nvm/nvm.sh && node --version
  args:
    executable: /bin/bash
  register: node_updated_version
  changed_when: false
  when: node_update_result is changed
  tags: ['cli', 'cli-update', 'update']

- name: Display Node.js update result
  debug:
    msg: |
      {% if node_update_result is changed %}
      Node.js updated: {{ node_current_version.stdout }} -> {{ node_updated_version.stdout }}
      {% else %}
      Node.js already up to date: {{ node_current_version.stdout }}
      {% endif %}
  when: node_current_version.stdout is defined
  tags: ['cli', 'cli-update', 'update']

