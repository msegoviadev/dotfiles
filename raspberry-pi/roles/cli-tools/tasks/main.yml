# ============================================
# Update Summary
# ============================================

- name: Display CLI tools update summary
  debug:
    msg: |
      ============================================
      CLI Tools Update Summary
      ============================================
      
      nvm:  {{ nvm_update_result is changed | ternary('Updated', 'Up to date') }}
      Node: {{ node_update_result is changed | ternary('Updated', 'Up to date') }}
