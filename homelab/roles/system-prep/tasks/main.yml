---
# ============================================
# System Prep Role
# ============================================
# Purpose: Update system, install essentials, set timezone
# Runs with: become: yes (root privileges)
# ============================================

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: ['update']

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  tags: ['update']
  register: apt_upgrade_result

- name: Display upgrade summary
  debug:
    msg: "{{ apt_upgrade_result.stdout_lines | default(['No packages upgraded']) }}"
  when: apt_upgrade_result is defined
  tags: ['update']

- name: Install essential packages
  apt:
    name:
      - build-essential
      - python3
      - python3-pip
      - git
      - curl
      - wget
      - vim
      - htop
      - unzip
    state: present

- name: Set timezone to {{ timezone }}
  timezone:
    name: "{{ timezone }}"

- name: Ensure systemd-timesyncd is running
  systemd:
    name: systemd-timesyncd
    state: started
    enabled: yes

- name: Stop and mask rpcbind
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - rpcbind
    - rpcbind.socket
  failed_when: false

- name: Stop and mask cups
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - cups
    - cups.socket
    - cups.path
  failed_when: false

- name: Deploy SSH hardening snippet
  template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: validate and restart sshd

- name: Validate sshd configuration
  command: sshd -t
  changed_when: false
  become: yes

- name: Run autoremove to clean up unused packages
  apt:
    autoremove: yes
    autoclean: yes
