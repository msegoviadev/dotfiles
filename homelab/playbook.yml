---
- name: Provision Homelab Servers - Shell, Dev Environment & OpenCode Server
  hosts: servers
  gather_facts: yes

  pre_tasks:
    - name: Test connection to servers
      ping:
      tags: always

    - name: Display target host information
      debug:
        msg: "Provisioning {{ ansible_hostname }} ({{ ansible_host }})"
      tags: always

  roles:
    - role: system-prep
      become: yes
      tags: ['system', 'prep']

    - role: docker
      become: yes
      tags: ['docker', 'container']

    - role: firewall
      become: yes
      tags: ['firewall', 'network', 'hardening']

    - role: zsh
      become: no
      tags: ['zsh', 'shell']

    - role: cli-tools
      become: yes
      tags: ['tools', 'cli']

    - role: git-config
      become: no
      tags: ['git', 'config']

    - role: tailscale
      become: no
      tags: ['tailscale', 'vpn']

    - role: opencode-server
      become: no
      tags: ['opencode', 'server']
      when: opencode_server_install | default(false)

    - role: deutsch-app
      become: no
      tags: ['deutsch-app']
      when: deutsch_app_install | default(false)

    - role: coolify-server
      become: yes
      tags: ['coolify', 'server']
      when: coolify_server_install | default(false)

    - role: cloudflare-tunnel
      become: yes
      tags: ['cloudflare', 'tunnel']
      when: cloudflare_tunnel_install | default(false)

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          ============================================
          🎉 Homelab Provisioning Complete!
          ============================================
          
          Next steps:
          1. Log out and log back in (or run: exec zsh)
          2. Verify your prompt shows:  {{ ansible_user }}@{{ inventory_hostname }}:~$
          3. Test tools: which fd rg bat jq yq ast-grep
          4. Check git config: git config --global --list
          
          Your shell is now fully configured!
      tags: always
